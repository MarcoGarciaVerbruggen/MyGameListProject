name: Daily Dev to Main Merge

on:
  schedule:
    # Runs every day at 4:05 AM UTC
    - cron: '5 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dev-to-main-merge
  cancel-in-progress: false

jobs:

  check-commits:
    runs-on: ubuntu-latest
    outputs:
      has_commits: ${{ steps.check_commits.outputs.has_commits }}
    steps:
      - name: Checkout dev branch (full history)
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Check for new commits on dev in the last 24h
        id: check_commits
        run: |
          COUNT=$(git log --since="24 hours ago" --oneline | wc -l)
          echo "Commits found in last 24h: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    needs: check-commits
    if: needs.check-commits.outputs.has_commits == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile project
        working-directory: gamingList
        run: mvn -B compile

      - name: Run tests
        working-directory: gamingList
        run: mvn -B test

  merge:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge dev into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main dev
          git checkout main
          git merge --no-ff origin/dev -m "Automated merge: dev into main [skip ci]"
          git push origin main